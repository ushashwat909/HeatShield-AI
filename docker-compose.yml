version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://heatshield:heatshield@postgres:5432/heatshield_db
      - SECRET_KEY=production-secret-key-change-this
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      - postgres

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      - POSTGRES_USER=heatshield
      - POSTGRES_PASSWORD=heatshield
      - POSTGRES_DB=heatshield_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

volumes:
  pgdata:
